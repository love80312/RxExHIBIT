name: CMake Build (x64 Release Only)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Developer Command Prompt for Microsoft Visual C++
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Ninja
      uses: ashutoshvarma/setup-ninja@master
      with:
        version: 1.11.1

    - name: CMake Configure
      run: cmake --preset x64-release

    - name: CMake Build
      run: cmake --build .build/x64-release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ExHIBIT_KeyFinder-x64-release
        # 直接指定 x64 release 的精確輸出路徑並只撈取 exe 與 dll
        path: |
          .bin/x64/release/*.exe
          .bin/x64/release/*.dll
        if-no-files-found: error
